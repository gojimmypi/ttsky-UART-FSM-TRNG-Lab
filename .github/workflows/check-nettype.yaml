name: Check Verilog default_nettype

on:
    push:
    pull_request:

jobs:
    check-nettype:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Check .v files for default_nettype rules
              shell: bash
              run: |
                  set -e

                  fail=0
                  expected_first='`default_nettype none'
                  expected_last='`default_nettype wire'

                  echo "Checking Verilog files..."

                  while IFS= read -r file; do
                      echo ""
                      echo "Checking: $file"

                      first_line=$(awk '
                          BEGIN {
                              in_block = 0
                          }

                          {
                              line = $0
                              gsub(/\r/, "", line)

                              while (1) {
                                  if (in_block) {
                                      if (match(line, /\*\//)) {
                                          line = substr(line, RSTART + RLENGTH)
                                          in_block = 0
                                      } else {
                                          line = ""
                                          break
                                      }
                                  } else if (match(line, /\/\*/)) {
                                      before = substr(line, 1, RSTART - 1)
                                      after = substr(line, RSTART + RLENGTH)

                                      if (match(after, /\*\//)) {
                                          after = substr(after, RSTART + RLENGTH)
                                          line = before after
                                      } else {
                                          line = before
                                          in_block = 1
                                      }
                                  } else {
                                      break
                                  }
                              }

                              sub(/^[ \t]+/, "", line)
                              sub(/[ \t]+$/, "", line)

                              if (line == "") {
                                  next
                              }

                              if (line ~ /^\/\//) {
                                  next
                              }

                              print line
                              exit
                          }
                      ' "$file")

                      last_line=$(awk '
                          BEGIN {
                              in_block = 0
                          }

                          {
                              line = $0
                              gsub(/\r/, "", line)

                              while (1) {
                                  if (in_block) {
                                      if (match(line, /\*\//)) {
                                          line = substr(line, RSTART + RLENGTH)
                                          in_block = 0
                                      } else {
                                          line = ""
                                          break
                                      }
                                  } else if (match(line, /\/\*/)) {
                                      before = substr(line, 1, RSTART - 1)
                                      after = substr(line, RSTART + RLENGTH)

                                      if (match(after, /\*\//)) {
                                          after = substr(after, RSTART + RLENGTH)
                                          line = before after
                                      } else {
                                          line = before
                                          in_block = 1
                                      }
                                  } else {
                                      break
                                  }
                              }

                              sub(/^[ \t]+/, "", line)
                              sub(/[ \t]+$/, "", line)

                              if (line == "") {
                                  next
                              }

                              if (line ~ /^\/\//) {
                                  next
                              }

                              last = line
                          }

                          END {
                              print last
                          }
                      ' "$file")

                      if [ "$first_line" != "$expected_first" ]; then
                          echo "ERROR: First meaningful line is not $expected_first"
                          echo "  Found: $first_line"
                          fail=1
                      fi

                      if [ "$last_line" != "$expected_last" ]; then
                          echo "ERROR: Last meaningful line is not $expected_last"
                          echo "  Found: $last_line"
                          fail=1
                      fi
                  done < <(find . -type f -name "*.v" | sort)

                  echo ""

                  if [ "$fail" -ne 0 ]; then
                      echo "FAILED: default_nettype checks did not pass"
                      exit 1
                  fi

                  echo "SUCCESS: All Verilog files passed default_nettype checks"