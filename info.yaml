# Tiny Tapeout project information
project:
  title:        "UART FSM TRNG PUF Explorer"      # Project title
  author:       "gojimmypi"      # Your name
  discord:      "gojimmypi"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Universal Asynchronous Receiver/Transmitter Finite State Machine for Exploring ASIC Hardware Physically Unclonable Function True Random Number Generators"      # One line description of what your project does
  language:     "Verilog" # other examples include Verilog, Amaranth, VHDL, etc
  clock_hz:     25000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  # tiles: "1x2"          # Valid values for analog projects: 1x2, 2x2
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # How many analog pins does your project use?
  # analog_pins: 0        # Valid values: 0 to 6
  # uses_3v3: false       # Set to true if your project uses 3.3V (VAPWR) in addition to 1.8V (VDPWR)

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_gojimmypi_ttsky_UART_FSM_TRNG_Lab"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  # Files for this project are included explicitly in project.v for TT builds.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
# Inputs
  ui[0]: "clk_ext_enable"      # unused_tied_low proposed: Optional external enable (gate core activity)
  ui[1]: "rst_n"               # Active-low reset
  ui[2]: "uart_rx"             # UART receive input
  ui[3]: "mode_sel0"           # unused_tied_low proposed: Mode select bit 0
  ui[4]: "mode_sel1"           # unused_tied_low proposed: Mode select bit 1
  ui[5]: "mode_sel2"           # unused_tied_low proposed: Mode select bit 2
  ui[6]: "trng_enable"         # unused_tied_low proposed: Enable TRNG / ring oscillator block
  ui[7]: "reserved_in"         # unused_tied_low proposed: Future use (keep flexible)

  # Outputs
  uo[0]: "heartbeat"           # Slow toggle (alive indicator)
  uo[1]: "trng_bit"            # Raw TRNG bit
  uo[2]: "trng_valid"          # TRNG valid strobe
  uo[3]: "ro_out0"             # Ring oscillator 0 (divided or sampled)
  uo[4]: "ro_out1"             # Ring oscillator 1 (divided or sampled)
  uo[5]: "uart_tx"             # UART transmit output
  uo[6]: "fsm_state0"          # FSM debug bit 0
  uo[7]: "fsm_state1"          # FSM debug bit 1

  # Bidirectional pins
  uio[0]: "cfg_data0"          # Config / register interface bit 0
  uio[1]: "cfg_data1"          # Config / register interface bit 1
  uio[2]: "cfg_data2"          # Config / register interface bit 2
  uio[3]: "cfg_data3"          # Config / register interface bit 3
  uio[4]: "debug_out0"         # Optional debug output
  uio[5]: "debug_out1"         # Optional debug output
  uio[6]: "ext_entropy_in"     # External entropy injection (future)
  uio[7]: "reserved_io"        # Keep free for later

  # Analog pins - make sure to also set "analog_pins" above, else the pins won't be connected
  # ua[0]: ""
  # ua[1]: ""
  # ua[2]: ""
  # ua[3]: ""
  # ua[4]: ""
  # ua[5]: ""

# Do not change!
yaml_version: 6
