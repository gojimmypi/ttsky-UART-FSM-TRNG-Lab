# Tiny Tapeout project information
project:
  title:        "UART FSM TRNG PUF Explorer"      # Project title
  author:       "gojimmypi"      # Your name
  discord:      "gojimmypi"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Universal Asynchronous Receiver/Transmitter Finite State Machine for Exploring ASIC Hardware Physically Unclonable Function True Random Number Generators"      # One line description of what your project does
  language:     "Verilog" # other examples include Verilog, Amaranth, VHDL, etc
  clock_hz:     25000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  # tiles: "1x2"          # Valid values for analog projects: 1x2, 2x2

  # How many analog pins does your project use?
  # analog_pins: 0        # Valid values: 0 to 6
  # uses_3v3: false       # Set to true if your project uses 3.3V (VAPWR) in addition to 1.8V (VDPWR)

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_gojimmypi"

  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "inputa"
  ui[1]: "inputb"
  ui[2]: "inputc"
  ui[3]: "inputd"
  ui[4]: "inpute"
  ui[5]: "inputf"
  ui[6]: "inputg"
  ui[7]: "inputh"

  # Outputs
  uo[0]: "output1"
  uo[1]: "output2"
  uo[2]: "output3"
  uo[3]: "output4"
  uo[4]: "output5"
  uo[5]: "output6"
  uo[6]: "output7"
  uo[7]: "output8"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

  # Analog pins - make sure to also set "analog_pins" above, else the pins won't be connected
  # ua[0]: ""
  # ua[1]: ""
  # ua[2]: ""
  # ua[3]: ""
  # ua[4]: ""
  # ua[5]: ""

# Do not change!
yaml_version: 6
